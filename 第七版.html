<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计学刷题系统【最终定制版】</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .view {
            display: none;
        }
        .view.active {
            display: block;
        }

        .home-module {
            margin: 30px 0;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .home-module:last-child {
            border-bottom: none;
        }
        .home-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .module-title {
            font-size: 20px;
            color: #34495e;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            min-width: 200px;
            margin: 5px;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-warning { background: #e74c3c; color: white; }
        .btn-warning:hover { background: #c0392b; }
        .btn-danger { background: #e67e22; color: white; }
        .btn-danger:hover { background: #d35400; }

        .chapter-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: default;
            user-select: none;
            transition: opacity 0.2s, transform 0.15s;
        }
        .chapter-item .drag-handle {
            cursor: grab;
            font-size: 18px;
            color: #999;
            padding: 4px;
            line-height: 1;
        }
        .chapter-item .drag-handle:active {
            cursor: grabbing;
        }
        .chapter-item.dragging {
            opacity: 0.4;
        }
        .chapter-item.drag-over {
            outline: 2px dashed #3498db;
            outline-offset: 4px;
            border-radius: 8px;
        }
        .section-list {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .delete-box {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .delete-select {
            padding: 10px;
            width: 300px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 16px;
        }
        .preview-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin: 15px 0;
            text-align: left;
        }
        .import-box {
            text-align: center;
            padding: 20px;
            border: 2px dashed #3498db;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
        }
        #fileInput {
            margin: 10px 0;
        }
        .tip {
            font-size: 14px;
            margin-top: 10px;
        }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        .btn-clear-record { padding: 6px 12px; background: #e67e22; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap; } .btn-clear-record:hover { background: #d35400; }
        .back-btn {
            padding: 6px 15px;
            background: #95a5a6; color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .title { font-size: 22px; color: #2c3e50; }
        .progress { color: #e67e22; font-weight: bold; font-size: 18px; }

        .question-en { font-size: 18px; line-height: 1.6; color: #2d3436; margin-bottom: 10px; font-weight: 500; }
        .question-cn {
            font-size: 17px; line-height: 1.6; margin-bottom: 30px; cursor: pointer;
            position: relative; color: transparent; transition: color 0.3s;
        }
        .question-cn::after {
            content: ''; position: absolute; left:0; top:0; width:100%; height:100%;
            background: #fff176; border-radius:4px; transition: opacity 0.3s;
        }
        .question-cn.active { color: #636e72; }
        .question-cn.active::after { opacity: 0; }

        .options { display: flex; flex-direction: column; gap:15px; margin-bottom:40px; }
        .option-item {
            display: flex; align-items: center; font-size:16px; padding:12px 15px;
            background: #f8f9fa; border-radius:8px; gap:20px; transition: all 0.3s;
        }
        .opt-en { width: 45%; color: #2c3e50; }
        .opt-cn {
            width: 45%; position: relative; color: transparent; transition: color 0.3s; cursor: pointer;
        }
        .opt-cn::after {
            content: ''; position: absolute; left:0; top:0; width:100%; height:100%;
            background: #fff176; border-radius:4px; transition: opacity 0.3s;
        }
        .opt-cn.active { color: #2c3e50; }
        .opt-cn.active::after { opacity: 0; }
        .option-click { cursor: pointer; }
        .option-click:hover { background: #eef2f5; }
        /* 核心颜色修改：正确答案绿色，用户选错的答案红色 */
        .option-selected { background: #d6eaf8 !important; }
        .option-correct { background: #2ecc71 !important; color: white !important; }
        .option-wrong { background: #ff4444 !important; color: white !important; }

        /* 答案区域：默认隐藏，选择后显示 */
        .answer-footer {
            display: none;
            align-items: center; justify-content: center; gap:15px;
            text-align: center; padding:15px; border-top:2px solid #eee;
            font-size:18px; font-weight: bold; color: #2c3e50;
        }
        .toggle-all-btn {
            padding:6px 12px; background: #9b59b6; color:white; border:none;
            border-radius:6px; cursor: pointer; font-size:14px;
        }
        .empty-tip {
            text-align: center; color: #7f8c8d; font-size:18px; padding:40px 0;
        }
        .wrong-count {
            color: #ff4444;
            font-size: 16px;
            margin-left: 10px;
        }

        /* 缩略图面板样式 */
        .thumbnail-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #8e44ad;
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 999;
        }
        .thumbnail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .thumbnail-modal.active {
            display: flex;
        }
        .thumbnail-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .thumbnail-title {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }
        .thumbnail-item {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .thumb-unfinish { background: #bdc3c7; color: white; }
        .thumb-correct { background: #2ecc71; color: white; }
        .thumb-wrong { background: #ff4444; color: white; }
        .thumb-current { border: 3px solid #f39c12; }
        .close-thumb {
            display: block;
            margin: 20px auto 0;
            padding: 8px 25px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* 切换提示 */
        .switch-tip {
            text-align: center;
            color: #7f8c8d;
            margin: 20px 0;
            font-size: 14px;
        }
    </style>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
</head>
<body>
    <!-- 首页 -->
    <div id="homeView" class="view active container">
        <h1 class="home-title">统计学刷题系统</h1>
        <div class="home-module">
            <h2 class="module-title">📖 章节选择</h2>
            <div class="section-list" id="sectionContainer"></div>
        </div>
        <div class="home-module">
            <h2 class="module-title">📚 错题库</h2>
            <div style="text-align: center;">
                <button class="btn btn-warning" onclick="startWrongPractice()">进入错题库刷题</button><span class="wrong-count-badge" id="wrongCountBadge" style="display:none;margin-left:10px;background:#e74c3c;color:white;padding:4px 12px;border-radius:12px;font-size:14px;"></span>
                <p class="tip error">规则：答对3次自动移除错题</p>
            </div>
        </div>
        <div class="home-module">
            <h2 class="module-title">🗑️ 章节删除</h2>
            <div class="delete-box">
                <select id="deleteSelect" class="delete-select" onchange="previewDeleteChapter()">
                    <option value="">请选择要删除的章节</option>
                </select>
                <div class="preview-box" id="deletePreview">预览内容：请选择章节</div>
                <button class="btn btn-danger" onclick="deleteChapter()">确认删除章节</button>
            </div>
        </div>
        <div class="home-module">
            <h2 class="module-title">📤 章节导入（TXT文本 / Word文档）</h2>
            <div class="import-box">
                <p class="tip error">支持 .txt / .docx 格式 | 文件名=章节名</p>
                <input type="file" id="fileInput" accept=".docx,.txt" />
                <div id="importTip" class="tip success"></div>
            </div>
        </div>
    </div>

    <!-- 常规刷题页面 -->
    <div id="practiceView" class="view container">
        <div class="header">
            <button class="back-btn" onclick="backToHome()">← 返回首页</button>
            <h2 class="title" id="chapterTitle">章节刷题</h2>
            <div class="progress" id="progress">第0题 | 0/0</div><button class="btn-clear-record" onclick="clearPracticeRecord()" title="清空本章做题记录（不影响错题库）">🔄 清空做题记录</button>
        </div>
        <div class="switch-tip">💡 电脑按 ← → 方向键 / 手机左右滑动 切换题目</div>
        <div class="question-en" id="qEn"></div>
        <div class="question-cn" id="qCn"></div>
        <div class="options" id="optionsBox"></div>
        <div class="answer-footer" id="answerFooter">
            ✅ 正确答案：<span id="correctAns"></span>
            <button class="toggle-all-btn" id="toggleAllBtn">一键显示/隐藏中文</button>
        </div>
        <button class="thumbnail-btn" onclick="openThumbnail()">📋</button>
    </div>

    <!-- 错题库刷题页面 -->
    <div id="wrongPracticeView" class="view container">
        <div class="header">
            <button class="back-btn" onclick="backToHome()">← 返回首页</button>
            <h2 class="title">📚 错题库刷题</h2>
            <div class="progress" id="wrongProgress">第0题 | 0/0</div>
        </div>
        <div class="switch-tip">💡 答对3次自动移除 | 方向键/滑动切换题目</div>
        <div class="question-en" id="wrongQEn"></div>
        <div class="question-cn" id="wrongQCn"></div>
        <div class="options" id="wrongOptionsBox"></div>
        <div class="answer-footer" id="wrongAnswerFooter">
            ✅ 正确答案：<span id="wrongCorrectAns"></span>
            <span class="wrong-count" id="correctCountTip">当前答对次数：0/3</span>
            <button class="toggle-all-btn" id="toggleWrongAllBtn">一键显示/隐藏中文</button>
        </div>
    </div>

    <!-- 题目缩略图弹窗 -->
    <div class="thumbnail-modal" id="thumbnailModal">
        <div class="thumbnail-box">
            <h3 class="thumbnail-title">题目进度总览（点击跳题）</h3>
            <div class="thumbnail-grid" id="thumbnailGrid"></div>
            <button class="close-thumb" onclick="closeThumbnail()">关闭</button>
        </div>
    </div>

    // 全局变量
    let questionBank = JSON.parse(localStorage.getItem('customBank')) || defaultBank;
    let wrongQuestions = JSON.parse(localStorage.getItem('wrongQuestions')) || [];
    let currentChapter = "";
    let currentQuestions = [];
    let currentIndex = 0;
    let wrongCurrentQuestions = [];
    let wrongCurrentIndex = 0;
    const optLetters = ['A', 'B', 'C', 'D'];

    // 初始化
    function initAll() {
        initSectionList();
        initDeleteSelect();
        bindKeyAndTouch();
        syncWrongQuestions();
    }

    // 页面切换
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function backToHome() {
        showView('homeView');
        saveAllProgress();
    }

    // 同步错题库（实时更新）
    function syncWrongQuestions() {
        const allQuestions = [];
        Object.values(questionBank).forEach(chapter => allQuestions.push(...chapter));
        wrongQuestions = allQuestions.filter(q => q.wrongCount > 0 && q.correctCountInWrong < 3);
        localStorage.setItem('wrongQuestions', JSON.stringify(wrongQuestions));
        localStorage.setItem('customBank', JSON.stringify(questionBank));
        updateWrongCountDisplay();
    }

    // 更新首页错题数显示
    function updateWrongCountDisplay() {
        const badge = document.getElementById('wrongCountBadge');
        if (!badge) return;
        const count = wrongQuestions.length;
        if (count > 0) {
            badge.style.display = 'inline-block';
            badge.innerText = count + ' 道错题';
        } else {
            badge.style.display = 'none';
        }
    }

    // 开始常规刷题
    function startPractice(chapter) {
        currentChapter = chapter;
        currentQuestions = JSON.parse(JSON.stringify(questionBank[chapter]));
        currentIndex = 0;
        document.getElementById('chapterTitle').innerText = `${chapter} 刷题`;
        renderQuestion();
        showView('practiceView');
    }

    // 开始错题库刷题
    function startWrongPractice() {
        syncWrongQuestions();
        if(wrongQuestions.length === 0){
            alert('🎉 恭喜！错题库为空');
            return;
        }
        wrongCurrentQuestions = JSON.parse(JSON.stringify(wrongQuestions));
        wrongCurrentQuestions.forEach(q => { q.userAnswer = ""; q.isCorrect = null; });
        wrongCurrentIndex = 0;
        renderWrongQuestion();
        showView('wrongPracticeView');
    }

    // 渲染常规题目
    function renderQuestion() {
        if (currentIndex >= currentQuestions.length) {
            alert('✅ 本章刷题完成！');
            backToHome();
            return;
        }
        const q = currentQuestions[currentIndex];
        const [en, cn] = q.en.split('|');
        document.getElementById('progress').innerText = `第${currentIndex+1}题 | ${currentIndex+1}/${currentQuestions.length}`;
        document.getElementById('qEn').innerText = en;
        document.getElementById('qCn').innerText = cn;
        document.getElementById('correctAns').innerText = q.answer;
        document.getElementById('answerFooter').style.display = q.userAnswer ? 'flex' : 'none';

        const box = document.getElementById('optionsBox');
        box.innerHTML = '';

        q.options.forEach((item, i) => {
            const [optEn, optCn] = item.en.split('|');
            const div = document.createElement('div');
            div.className = 'option-item option-click';
            div.dataset.ans = optLetters[i];
            
            const optCnEl = document.createElement('div');
            optCnEl.className = 'opt-cn';
            optCnEl.innerText = optCn;
            optCnEl.onclick = e => { e.stopPropagation(); optCnEl.classList.toggle('active'); };

            div.innerHTML = `<div class="opt-en">${optLetters[i]}. ${optEn}</div>`;
            div.appendChild(optCnEl);
            div.onclick = () => selectNormalOption(div, q);
            box.appendChild(div);
        });

        if (q.userAnswer) {
            const allOpts = document.querySelectorAll('#optionsBox .option-item');
            allOpts.forEach(opt => {
                if (opt.dataset.ans === q.userAnswer) opt.classList.add('option-selected');
                if (opt.dataset.ans === q.answer) opt.classList.add('option-correct');
                if (q.userAnswer === opt.dataset.ans && q.userAnswer !== q.answer) opt.classList.add('option-wrong');
            });
        }
    }

    // 渲染错题库题目
    function renderWrongQuestion() {
        if (wrongCurrentIndex >= wrongCurrentQuestions.length) {
            syncWrongQuestions();
            alert('✅ 本轮错题刷题完成！');
            backToHome();
            return;
        }
        const q = wrongCurrentQuestions[wrongCurrentIndex];
        const [en, cn] = q.en.split('|');
        document.getElementById('wrongProgress').innerText = `第${wrongCurrentIndex+1}题 | ${wrongCurrentIndex+1}/${wrongCurrentQuestions.length}`;
        document.getElementById('wrongQEn').innerText = en;
        document.getElementById('wrongQCn').innerText = cn;
        document.getElementById('wrongCorrectAns').innerText = q.answer;
        document.getElementById('correctCountTip').innerText = `当前答对次数：${q.correctCountInWrong}/3`;
        document.getElementById('wrongAnswerFooter').style.display = q.userAnswer ? 'flex' : 'none';

        const box = document.getElementById('wrongOptionsBox');
        box.innerHTML = '';

        q.options.forEach((item, i) => {
            const [optEn, optCn] = item.en.split('|');
            const div = document.createElement('div');
            div.className = 'option-item option-click';
            div.dataset.ans = optLetters[i];
            
            const optCnEl = document.createElement('div');
            optCnEl.className = 'opt-cn';
            optCnEl.innerText = optCn;
            optCnEl.onclick = e => { e.stopPropagation(); optCnEl.classList.toggle('active'); };

            div.innerHTML = `<div class="opt-en">${optLetters[i]}. ${optEn}</div>`;
            div.appendChild(optCnEl);
            div.onclick = () => selectWrongOption(div, q);
            box.appendChild(div);
        });

        if (q.userAnswer) {
            document.querySelectorAll('#wrongOptionsBox .option-item').forEach(opt => {
                if (opt.dataset.ans === q.userAnswer) opt.classList.add('option-selected');
                if (opt.dataset.ans === q.answer) opt.classList.add('option-correct');
                if (q.userAnswer === opt.dataset.ans && q.userAnswer !== q.answer) opt.classList.add('option-wrong');
            });
        }
    }

    // 常规刷题选择选项（实时加入错题库）
    function selectNormalOption(optionEl, q) {
        if (q.userAnswer) return;
        const userAns = optionEl.dataset.ans;
        q.userAnswer = userAns;
        q.isCorrect = userAns === q.answer;

        optionEl.classList.add('option-selected');
        document.querySelectorAll('#optionsBox .option-item').forEach(opt => {
            if (opt.dataset.ans === q.answer) opt.classList.add('option-correct');
            if (userAns === opt.dataset.ans && userAns !== q.answer) opt.classList.add('option-wrong');
        });

        document.getElementById('answerFooter').style.display = 'flex';

        // 实时错题库机制：做错立即入库
        if (!q.isCorrect) {
            q.wrongCount += 1;
            q.correctCountInWrong = 0;
        }
        saveAllProgress();
    }

        if(q.isCorrect){
            q.correctCountInWrong += 1;
            document.getElementById('correctCountTip').innerText = `当前答对次数：${q.correctCountInWrong}/3`;
            
            // 更新原题库数据
            const target = findQuestionById(q.id);
            if(target) target.correctCountInWrong = q.correctCountInWrong;
            
            if(q.correctCountInWrong >=3){
                setTimeout(()=>{
                    alert('✅ 已答对3次，该题从错题库移除！');
                    syncWrongQuestions();
                    changeWrongQuestion(1);
                },800);
            }
        }
        saveAllProgress();
    }

    // 根据ID查找题目
    function findQuestionById(id){
        for(let chapter in questionBank){
            const q = questionBank[chapter].find(item => item.id == id);
            if(q) return q;
        }
        return null;
    }

    // 绑定方向键+滑动切换
    function bindKeyAndTouch() {
        document.addEventListener('keydown', e => {
            if (document.getElementById('practiceView').classList.contains('active')) {
                if (e.key === 'ArrowLeft') changeQuestion(-1);
                if (e.key === 'ArrowRight') changeQuestion(1);
            }
            if (document.getElementById('wrongPracticeView').classList.contains('active')) {
                if (e.key === 'ArrowLeft') changeWrongQuestion(-1);
                if (e.key === 'ArrowRight') changeWrongQuestion(1);
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (document.getElementById('practiceView').classList.contains('active')) {
                if (touchStartX - touchEndX > 50) changeQuestion(1);
                if (touchEndX - touchStartX > 50) changeQuestion(-1);
            }
            if (document.getElementById('wrongPracticeView').classList.contains('active')) {
                if (touchStartX - touchEndX > 50) changeWrongQuestion(1);
                if (touchEndX - touchStartX > 50) changeWrongQuestion(-1);
            }
        });
    }

    // 常规题目切换
    function changeQuestion(direction) {
        const newIndex = currentIndex + direction;
        if (newIndex < 0 || newIndex >= currentQuestions.length) return;
        currentIndex = newIndex;
        renderQuestion();
    }

    // 错题题目切换
    function changeWrongQuestion(direction) {
        const newIndex = wrongCurrentIndex + direction;
        if (newIndex < 0 || newIndex >= wrongCurrentQuestions.length) return;
        wrongCurrentIndex = newIndex;
        renderWrongQuestion();
    }

    // 缩略图功能
    function openThumbnail() {
        const grid = document.getElementById('thumbnailGrid');
        grid.innerHTML = '';
        currentQuestions.forEach((q, idx) => {
            const item = document.createElement('div');
            item.className = 'thumbnail-item';
            if (idx === currentIndex) item.classList.add('thumb-current');
            if (q.isCorrect === null) item.classList.add('thumb-unfinish');
            else if (q.isCorrect) item.classList.add('thumb-correct');
            else item.classList.add('thumb-wrong');
            item.innerText = idx + 1;
            item.onclick = () => { currentIndex = idx; renderQuestion(); closeThumbnail(); };
            grid.appendChild(item);
        });
        document.getElementById('thumbnailModal').classList.add('active');
    }
    function closeThumbnail() {
        document.getElementById('thumbnailModal').classList.remove('active');
    }

    // 数据保存
    function saveAllProgress() {
        if(currentChapter) questionBank[currentChapter] = currentQuestions;
        localStorage.setItem('customBank', JSON.stringify(questionBank));
        syncWrongQuestions();
    }

    // 清空做题记录（不影响错题库）
    function clearPracticeRecord() {
        if (!currentChapter || !currentQuestions.length) return;
        if (!confirm('确定要清空本章所有做题记录吗？\n（错题库中的题目不会被移除）')) return;
        currentQuestions.forEach(q => {
            q.userAnswer = '';
            q.isCorrect = null;
        });
        currentIndex = 0;
        saveAllProgress();
        renderQuestion();
    }

    // 基础功能
    function initSectionList() {
        const container = document.getElementById('sectionContainer');
        container.innerHTML = '';
        const chapters = Object.keys(questionBank);
        chapters.forEach((chapter, index) => {
            const item = document.createElement('div');
            item.className = 'chapter-item';
            item.draggable = true;
            item.dataset.chapter = chapter;
            item.dataset.index = index;

            const handle = document.createElement('span');
            handle.className = 'drag-handle';
            handle.innerText = '\u2804\u2804';
            item.appendChild(handle);

            const btn = document.createElement('button');
            btn.className = 'btn btn-primary';
            btn.innerText = chapter;
            btn.onclick = (e) => { e.stopPropagation(); startPractice(chapter); };
            item.appendChild(btn);

            item.addEventListener('dragstart', handleDragStart);
            item.addEventListener('dragend', handleDragEnd);
            item.addEventListener('dragover', handleDragOver);
            item.addEventListener('dragleave', handleDragLeave);
            item.addEventListener('drop', handleChapterDrop);

            container.appendChild(item);
        });
    }

    function getChapterKeys() {
        return Object.keys(questionBank);
    }

    let draggedChapter = null;
    function handleDragStart(e) {
        draggedChapter = this.dataset.chapter;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.dataset.chapter);
    }
    function handleDragEnd(e) {
        this.classList.remove('dragging');
        document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('drag-over'));
        draggedChapter = null;
    }
    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('drag-over');
    }
    function handleDragLeave(e) {
        this.classList.remove('drag-over');
    }
    function handleChapterDrop(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        const fromChapter = e.dataTransfer.getData('text/plain');
        const toChapter = this.dataset.chapter;
        if (fromChapter && fromChapter !== toChapter) {
            reorderChapters(fromChapter, toChapter);
        }
    }

    function reorderChapters(fromKey, toKey) {
        const keys = Object.keys(questionBank);
        const fromIdx = keys.indexOf(fromKey);
        const toIdx = keys.indexOf(toKey);
        if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
        keys.splice(fromIdx, 1);
        keys.splice(toIdx, 0, fromKey);
        const newBank = {};
        keys.forEach(k => { newBank[k] = questionBank[k]; });
        questionBank = newBank;
        localStorage.setItem('customBank', JSON.stringify(questionBank));
        initSectionList();
        initDeleteSelect();
    }

    function initDeleteSelect() {
        const select = document.getElementById('deleteSelect');
        select.innerHTML = '<option value="">请选择要删除的章节</option>';
        Object.keys(questionBank).forEach(chapter => {
            const option = document.createElement('option');
            option.value = chapter;
            option.innerText = chapter;
            select.appendChild(option);
        });
    }
    function previewDeleteChapter() {
        const chapter = document.getElementById('deleteSelect').value;
        const preview = document.getElementById('deletePreview');
        preview.innerText = chapter ? `✅ 章节：${chapter} | 题目：${questionBank[chapter].length}道` : "预览内容：请选择章节";
    }
    function deleteChapter() {
        const chapter = document.getElementById('deleteSelect').value;
        if (!chapter || !confirm(`⚠️ 确认删除【${chapter}】？`)) return;
        delete questionBank[chapter];
        if (currentChapter === chapter) { currentChapter = ""; currentQuestions = []; }
        saveAllProgress();
        initAll();
        alert(`✅ 删除成功！`);
    }

    // 文件导入
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const chapterName = file.name.replace(/\.[^/.]+$/, '');
        const tip = document.getElementById('importTip');
        let text = "";
        try {
            text = file.name.endsWith('.txt') ? await readTxt(file) : await readDocx(file);
            const questions = parseTextToQuestions(text);
            questionBank[chapterName] = questions;
            saveAllProgress();
            initAll();
            tip.innerText = `✅ 导入成功：${chapterName}（${questions.length}道题）`;
        } catch (err) {
            tip.innerText = `❌ 导入失败：${err.message}`;
        }
    });
    const readTxt = file => new Promise(resolve => { const r = new FileReader(); r.readAsText(file, 'UTF-8'); r.onload = () => resolve(r.result); });
    const readDocx = async file => { const a = await file.arrayBuffer(); const d = await window.docx.Packer.toJson(a); return d.value; };
    function parseTextToQuestions(text) {
        const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
        const qs = [], temp = {};
        let id = Date.now();
        lines.forEach(line => {
            if (line.startsWith('【题目】')) { if(temp.en) qs.push({...temp,id:id++,userAnswer:"",isCorrect:null,wrongCount:0,correctCountInWrong:0}); temp.en = line.replace('【题目】',''), temp.options=[], temp.answer=''; }
            if (line.startsWith('【选项')) temp.options.push({en:line.split('】')[1]});
            if (line.startsWith('【答案】')) temp.answer = line.replace('【答案】','').trim();
        });
        if(temp.en) qs.push({...temp,id:id++,userAnswer:"",isCorrect:null,wrongCount:0,correctCountInWrong:0});
        return qs;
    }

    // 一键切换中文
    document.getElementById('wrongQCn').onclick = () => document.getElementById('wrongQCn').classList.toggle('active');
    document.getElementById('toggleWrongAllBtn').onclick = () => {
        [document.getElementById('wrongQCn'), ...document.querySelectorAll('#wrongOptionsBox .opt-cn')].forEach(el => el.classList.toggle('active'));
    };

    document.getElementById('toggleAllBtn').onclick = () => {
        [document.getElementById('qCn'), ...document.querySelectorAll('#optionsBox .opt-cn')].forEach(el => el.classList.toggle('active'));
    };
    document.getElementById('qCn').onclick = () => document.getElementById('qCn').classList.toggle('active');

    initAll();
</script>
</body>
</html>
